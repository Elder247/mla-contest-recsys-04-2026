defaults:
  - data: 50m
  - split: temporal
  - _self_

seed: 42
top_k: 100
run_id: "008"

# Set true to ignore cached CG pickles and refit from scratch.
force_refit_cg: false

# Hard guard: drop (uid, item_id) pairs found in dislikes.parquet from the
# merged candidate pool before scoring. Complements the pair_is_disliked
# ranker feature (added in A2): the feature is for soft signals around
# disliked items, the filter ensures dislikes never reach top-100.
filter_dislikes: true

# Optional cache for the merged feature table (LazyFrame sink_parquet).
# Phase A2 wires this up; A1 ignores it.
cache_features: false

# CatBoost native feature_importance saved as artifacts/feature_importance_{run_id}.csv
compute_feature_importance: true

# Phase C.4 — append 4 audio-embedding cosine ranker features. Set false
# to skip (saves ~10-20 s of feature build on 50m).
enable_embed_features: true

# All persisted state goes under ``artifacts_root``. Override on the CLI to
# move to a different filesystem (e.g. server's persistent disk):
#     python -u scripts/train_ranker.py ... artifacts_root=/mnt/dc-remote/artifacts
artifacts_root: artifacts
output_dir: ${artifacts_root}        # results.csv, feature_importance_*.csv
ranker_dir: ${artifacts_root}        # ranker_{run_id}.pkl
features_dir: ${artifacts_root}/features
cg_cache_dir: ${artifacts_root}/cg

# ── Candidate generators ─────────────────────────────────────────────────
# Each entry is a Hydra-instantiable config. ``name`` becomes the CG's
# ``self.name`` and drives the ``{name}_score`` / ``{name}_rank`` columns
# emitted by merge_candidates.
candidate_generators:
  - _target_: src.models.pop.DecayPop
    name: decaypop
    n_cand: 100
    half_life_units: 518400

  - _target_: src.models.als.ALSModel
    name: als
    factors: 128
    iterations: 20
    regularization: 0.01
    alpha: 40.0
    n_cand: 500
    high_engagement_weight: 3.0
    mid_engagement_weight: 1.0
    low_engagement_weight: 0.3
    mid_threshold: 50.0
    high_threshold: 80.0
    random_state: 42

  - _target_: src.models.repeat.RepeatListenModel
    name: repeat
    n_cand: 200
    half_life_units: 518400

  - _target_: src.models.itemknn.ItemKNNModel
    name: itemknn
    k: 200
    n_cand: 200

  - _target_: src.models.artist_pop.ArtistAlbumPopModel
    name: artist_pop
    entity: artist
    top_entities: 10
    n_cand: 100
    half_life_units: 518400

  - _target_: src.models.artist_pop.ArtistAlbumPopModel
    name: album_pop
    entity: album
    top_entities: 10
    n_cand: 100
    half_life_units: 518400

  - _target_: src.models.recent_likes.RecentLikesModel
    name: recent_likes
    n_cand: 100
    half_life_units: 518400
    data_source: likes

  - _target_: src.models.audio_knn.AudioEmbedKNNModel
    name: audio_knn
    n_cand: 100
    user_history_k: 20
    hnsw_m: 32
    ef_construction: 200
    ef_search: 64

  # eSASRec — sequential SOTA. Disabled locally (heavy training);
  # uncomment on server (Phase C) and tune hyperparams via Optuna.
  # - _target_: src.models.esasrec.ESASRecModel
  #   name: esasrec
  #   n_cand: 200
  #   emb_dim: 256
  #   n_blocks: 2
  #   n_heads: 4
  #   dropout: 0.2
  #   sequence_max_len: 200
  #   n_negatives: 256
  #   max_epochs: 100
  #   lr: 0.001
  #   batch_size: 128
  #   device: auto
  #   random_state: 42

ranker:
  iterations: 2000
  depth: 6
  learning_rate: 0.05
  l2_leaf_reg: 5.0
  early_stopping_rounds: 100
  random_state: 42

hydra:
  output_subdir: null
  run:
    dir: .
