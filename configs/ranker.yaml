defaults:
  - data: 50m
  - split: temporal
  - _self_

seed: 42
top_k: 100
run_id: "004"

# Set true to ignore cached CG pickles and refit from scratch.
force_refit_cg: false

# Hard guard: drop (uid, item_id) pairs found in dislikes.parquet from the
# merged candidate pool before scoring. Complements the pair_is_disliked
# ranker feature (added in A2): the feature is for soft signals around
# disliked items, the filter ensures dislikes never reach top-100.
filter_dislikes: true

# Optional cache for the merged feature table (LazyFrame sink_parquet).
# Phase A2 wires this up; A1 ignores it.
cache_features: false

# CatBoost native feature_importance saved as artifacts/feature_importance_{run_id}.csv
compute_feature_importance: true

output_dir: artifacts        # results.csv, feature_importance_*.csv
ranker_dir: artifacts        # ranker_{run_id}.pkl
features_dir: artifacts/features
cg_cache_dir: artifacts/cg

# ── Candidate generators ─────────────────────────────────────────────────
# Each entry is a Hydra-instantiable config. ``name`` becomes the CG's
# ``self.name`` and drives the ``{name}_score`` / ``{name}_rank`` columns
# emitted by merge_candidates.
candidate_generators:
  - _target_: src.models.pop.DecayPop
    name: decaypop
    n_cand: 100
    half_life_units: 86400

  - _target_: src.models.als.ALSModel
    name: als
    factors: 128
    iterations: 20
    regularization: 0.01
    alpha: 40.0
    n_cand: 500
    high_engagement_weight: 3.0
    mid_engagement_weight: 1.0
    low_engagement_weight: 0.3
    mid_threshold: 50.0
    high_threshold: 80.0
    random_state: 42

  - _target_: src.models.repeat.RepeatListenModel
    name: repeat
    n_cand: 200
    half_life_units: 86400

ranker:
  iterations: 500
  depth: 6
  learning_rate: 0.1
  early_stopping_rounds: 50
  random_state: 42

hydra:
  output_subdir: null
  run:
    dir: .
