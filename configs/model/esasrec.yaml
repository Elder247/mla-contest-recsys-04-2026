_target_: src.models.esasrec.ESASRecModel
name: esasrec
n_cand: 200

# Architecture — SASRec/antklen-aligned, не BERT4Rec-large
# с 627k items embeddings уже = 80M params на emb_dim=128 — больше не надо
emb_dim: 128
n_blocks: 2
n_heads: 4
dropout: 0.3            # SASRec paper: 0.5 для small; 0.3 — компромисс на 500m
sequence_max_len: 200

# Training — optimized for A100
n_negatives: 16        # was 256: at batch=512 that's 26.8 GB/step → OOM
max_epochs: 20         # sufficient at 500m scale; early stopping handles the rest
lr: 0.001
batch_size: 512        # was 128; A100 80 GB comfortably holds 512
weight_decay: 0.01
max_grad_norm: 1.0

# Early stopping (val_pct fraction of sequences held out for val loss)
patience: 5
val_pct: 0.1

# DataLoader
num_workers: 4         # was 0; parallel prefetch prevents GPU starvation
use_amp: true          # BF16 autocast on CUDA: halves VRAM, ~2× speedup on A100

# Sliding window — обязательно ≥1 для нормального обучения. null даёт 1 sample/user
# (на 9k users = 18 batches/epoch, недообучение гарантировано).
window_stride: 50

# Inference — decoupled from batch_size to avoid OOM on all-item scoring
# 64 × 9.4M items × 4B = 2.4 GB per batch (safe on any A100)
infer_batch_size: 64

# auto = cuda/mps/cpu in priority order; override to "cpu" for smoke tests
device: auto
random_state: 42
