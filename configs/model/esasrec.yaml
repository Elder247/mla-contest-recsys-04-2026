_target_: src.models.esasrec.ESASRecModel
name: esasrec
n_cand: 200

# Architecture (paper defaults; tune via Optuna phase=cg cg_name=esasrec)
emb_dim: 256
n_blocks: 2
n_heads: 4
dropout: 0.2
sequence_max_len: 200
n_negatives: 256

# Training
max_epochs: 100
lr: 0.001
batch_size: 128

# auto = mps/cuda/cpu in priority order; override to "cpu" for stable smoke tests
device: auto
random_state: 42
