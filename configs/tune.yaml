defaults:
  - data: 500m
  - split: temporal
  - _self_

seed: 42

# Which surface to tune: cg | ranker | n_cand | joint | joint_v2
# - cg:       single CG by Recall@n_max (coverage proxy)
# - ranker:   CatBoost hyperparams on cached features (no n_cand search)
# - n_cand:   per-CG n_cand allocation, no ranker refit
# - joint:    ranker + n_cand jointly, refits ranker per trial.
# - joint_v2: anti-overfit joint — combined val+test, n_cand_min=0,
#             no budget penalty, n_max_per_cg=500. Use this on fresh runs.
phase: ranker

# Common
# Set to null so per-CG / per-phase defaults below kick in. Override on CLI
# (eg. ``n_trials=3``) to force-run an exact count for smoke tests / debug.
n_trials: null
artifacts_root: /home/astrofimuk/dc-remote/artifacts  # override to redirect study + cache reads
storage_dir: ${artifacts_root}/optuna                 # sqlite storage will go here
top_k: 100                                            # contest k
run_id: "008"                                         # used to locate cached features / ranker pkl

# Default study_name = ${phase} for ranker / n_cand and ``cg_${cg_name}`` for cg.
# Override on CLI for parallel studies (eg. ``study_name=cg_als_v2``).
study_name: ${phase}

# Per-phase n_trials overrides (Phase 1A / 1B / 1C from misty-plotting plan):
#   - 8 CGs run sequentially via ``phase=cg cg_name=...``; trials adjusted to
#     fit each CG's fit cost on 50m.
#   - n_cand budget search has a tiny effective space (zero re-fit per trial),
#     so 15 trials is plenty.
#   - ranker hyperparams: 25 trials × 3 min on GPU = ~75 min.
n_trials_per_cg:
  decaypop: 25
  repeat: 25
  recent_likes: 25
  artist_pop: 30
  album_pop: 30
  als: 20
  itemknn: 20
  audio_knn: 20

n_trials_per_phase:
  ranker: 25
  n_cand: 15
  joint: 100
  joint_v2: 60

# ── phase=cg ──────────────────────────────────────────────────────────────
# CG class is selected by ``cg_name`` (must match one of the supported builders
# in scripts/tune.py: decaypop, repeat, recent_likes, als, itemknn,
# artist_pop, album_pop, audio_knn).
cg_name: decaypop
data_source: listens                      # "listens" or "likes" (RecentLikes uses likes)
n_max: 350                                # top-N for the standalone Recall@N_max metric
                                          # (matches Phase 1B n_max_per_cg)

# ── phase=ranker ──────────────────────────────────────────────────────────
# Cached feature parquets produced by train_ranker.py with cache_features=true.
labeled_features_path: ${artifacts_root}/features/${run_id}_train.parquet
eval_features_path: ${artifacts_root}/features/${run_id}_eval.parquet

# ── phase=n_cand / joint ──────────────────────────────────────────────────
# Both phases use the same per-CG knobs. ``joint`` additionally refits the
# CatBoost ranker per trial on the filtered training pool.
ranker_path: ${artifacts_root}/ranker_${run_id}.pkl
n_max_per_cg: 350                         # must equal cg.n_cand used to build cached features
total_budget: 1600                        # soft cap on sum(n_cand). Post-dedup ~1000-1100/user → mostly fits GPU 1023; RRF trims the rest
budget_step: 25                           # also used as suggest_int step for n_cand_*
n_cand_min: 25                            # joint phase only — lower bound on per-CG n_cand
cg_names_list: [decaypop, als, repeat, itemknn, artist_pop, album_pop, recent_likes, audio_knn]

# ── phase=joint_v2 overrides ─────────────────────────────────────────────
# Anti-overfit joint tuning. All keys above (n_max_per_cg, budget_step,
# n_cand_min, cg_names_list, ranker hyperparams via the joint phase) still
# apply; on the CLI override the ones below for joint_v2:
#
#   python -u scripts/tune.py phase=joint_v2 data=500m \
#       run_id=v2_features n_max_per_cg=500 n_cand_min=0 \
#       cg_names_list='[decaypop,als,repeat,itemknn,artist_pop,album_pop,recent_likes,audio_knn,esasrec]' \
#       study_name=joint_v2 n_trials=60
#
# Notes:
#   - n_cand_min: 0 lets a CG be effectively disabled (vs forced ≥25 in v1).
#   - n_max_per_cg: 500 — must match the n_cand used to build cached features.
#     Bump configs/ranker.yaml temporarily to 500 for each CG before running
#     train_ranker.py with cache_features=true, then revert.
#   - combined_objective: averages val + test recalls (test is +1 day shifted)
#     to reduce variance / overfit to a single window.
#   - n_startup_trials: random exploration before TPE — wider than v1's
#     default (10) to dilute multi-test bias on a 13-D space (4 ranker + 9 n_cand).
combined_objective: true
n_startup_trials: 20

# joint-only: ranker training on GPU. early_stopping_rounds is fixed (not
# sampled) to keep the search dimension low. Override on CLI for CPU-only
# smoke tests: ``task_type=CPU devices=null``.
task_type: GPU
devices: "0"
early_stopping_rounds: 150

hydra:
  output_subdir: null
  run:
    dir: .
